name: rust-release

on:
  push:
    tags:
      - "rust-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to dry-run or publish, without rust-v prefix"
        required: true
        type: string
      create_release:
        description: "Create the GitHub Release instead of uploading dry-run artifacts only"
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.context.outputs.version }}
      tag: ${{ steps.context.outputs.tag }}
      create_release: ${{ steps.context.outputs.create_release }}
      prerelease: ${{ steps.context.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate release version
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            [[ "${GITHUB_REF_TYPE}" == "tag" ]] || {
              echo "release pushes must be tag pushes"
              exit 1
            }
            tag="${GITHUB_REF_NAME}"
            create_release="true"
          else
            version="${{ inputs.version }}"
            tag="rust-v${version}"
            create_release="${{ inputs.create_release }}"
          fi

          [[ "${tag}" =~ ^rust-v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] || {
            echo "tag ${tag} does not match rust-vX.Y.Z[-alpha.N|-beta.N]"
            exit 1
          }

          version="${tag#rust-v}"
          cargo_version="$(python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("codex-rs/Cargo.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', manifest, re.MULTILINE)
          if not match:
              raise SystemExit("unable to read workspace version from codex-rs/Cargo.toml")
          print(match.group(1))
          PY
          )"

          [[ "${version}" == "${cargo_version}" ]] || {
            echo "release version ${version} does not match Cargo workspace version ${cargo_version}"
            exit 1
          }

          prerelease="false"
          if [[ "${version}" == *-* ]]; then
            prerelease="true"
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "create_release=${create_release}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: release-context
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: codex-rs
    env:
      AEGIS_SOURCE_REVISION: ${{ github.sha }}
      MACOS_SIGNING_CONFIGURED: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_NOTARIZATION_KEY_P8 != '' && secrets.APPLE_NOTARIZATION_KEY_ID != '' && secrets.APPLE_NOTARIZATION_ISSUER_ID != '' }}
      CARGO_PROFILE_RELEASE_LTO: thin
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-xlarge
            target: aarch64-apple-darwin
            platform_package: aegis-darwin-arm64
            package_asset: aegis-npm-darwin-arm64
            binaries: "aegis"
            build_dmg: "true"
          - runner: macos-15-xlarge
            target: x86_64-apple-darwin
            platform_package: aegis-darwin-x64
            package_asset: aegis-npm-darwin-x64
            binaries: "aegis"
            build_dmg: "true"
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            platform_package: aegis-linux-x64
            package_asset: aegis-npm-linux-x64
            binaries: "aegis bwrap"
            build_dmg: "false"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform_package: aegis-linux-arm64
            package_asset: aegis-npm-linux-arm64
            binaries: "aegis bwrap"
            build_dmg: "false"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Print runner specs
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner: ${RUNNER_NAME:-unknown}"
          echo "OS: $(uname -a)"
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            echo "Logical CPUs: $(nproc)"
            df -h .
          else
            echo "Logical CPUs: $(sysctl -n hw.logicalcpu)"
            df -h .
          fi

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js for package staging
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install Linux release dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libubsan1 \
            pkg-config \
            zstd

      - name: Install macOS release dependencies
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            brew install zstd
          fi

      - if: ${{ runner.os == 'Linux' }}
        name: Use hermetic Cargo home for musl
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - if: ${{ runner.os == 'Linux' }}
        name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - if: ${{ runner.os == 'Linux' }}
        name: Install musl build tools
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ runner.os == 'Linux' }}
        name: Configure musl build environment
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/' || true)"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          {
            echo "RUSTC_WRAPPER=${wrapper}"
            echo "RUSTC_WORKSPACE_WRAPPER="
            echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1"
            echo "RUSTFLAGS="
            echo "CARGO_ENCODED_RUSTFLAGS="
            echo "RUSTDOCFLAGS="
            echo "CARGO_BUILD_RUSTFLAGS="
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS="
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="
          } >> "$GITHUB_ENV"

      - if: ${{ runner.os == 'Linux' }}
        name: Configure musl rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ matrix.target }}

      - if: ${{ runner.os == 'Linux' }}
        name: Build bwrap and export digest
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          cargo build --target "$target" --release --timings --bin bwrap

          bwrap_path="target/${target}/release/bwrap"
          digest="$(sha256sum "$bwrap_path" | awk '{print $1}')"
          echo "CODEX_BWRAP_SHA256=${digest}" >> "$GITHUB_ENV"
          echo "Built bwrap ${bwrap_path} with sha256:${digest}"

      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          build_args=()
          for binary in ${{ matrix.binaries }}; do
            build_args+=(--bin "$binary")
          done
          cargo build --target ${{ matrix.target }} --release --timings "${build_args[@]}"

      - name: Upload Cargo timings
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: cargo-timings-rust-release-${{ matrix.target }}
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn

      - if: ${{ runner.os == 'Linux' }}
        name: Cosign Linux artifacts
        uses: ./.github/actions/linux-code-sign
        with:
          target: ${{ matrix.target }}
          artifacts-dir: ${{ github.workspace }}/codex-rs/target/${{ matrix.target }}/release
          binaries: ${{ matrix.binaries }}

      - if: ${{ runner.os == 'macOS' && env.MACOS_SIGNING_CONFIGURED == 'true' }}
        name: Sign and notarize macOS binary
        uses: ./.github/actions/macos-code-sign
        with:
          target: ${{ matrix.target }}
          binaries: ${{ matrix.binaries }}
          sign-binaries: "true"
          sign-dmg: "false"
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple-notarization-key-p8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          apple-notarization-key-id: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          apple-notarization-issuer-id: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}

      - if: ${{ runner.os == 'macOS' && env.MACOS_SIGNING_CONFIGURED != 'true' }}
        name: Record unsigned macOS signing status
        shell: bash
        run: |
          set -euo pipefail
          echo "macOS artifacts are unsigned because Apple signing/notarization secrets are not configured." \
            > "target/${{ matrix.target }}/release/aegis-${{ matrix.target }}.unsigned.txt"

      - if: ${{ runner.os == 'macOS' && matrix.build_dmg == 'true' }}
        name: Build macOS dmg
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          release_dir="target/${target}/release"
          dmg_root="${RUNNER_TEMP}/aegis-dmg-root"
          dmg_path="${release_dir}/aegis-${target}.dmg"

          rm -rf "$dmg_root"
          mkdir -p "$dmg_root"
          cp "${release_dir}/aegis" "${dmg_root}/aegis"
          hdiutil create -volname "Aegis Code (${target})" -srcfolder "$dmg_root" -format UDZO -ov "$dmg_path"

      - if: ${{ runner.os == 'macOS' && matrix.build_dmg == 'true' && env.MACOS_SIGNING_CONFIGURED == 'true' }}
        name: Sign and notarize macOS dmg
        uses: ./.github/actions/macos-code-sign
        with:
          target: ${{ matrix.target }}
          sign-binaries: "false"
          sign-dmg: "true"
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple-notarization-key-p8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          apple-notarization-key-id: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          apple-notarization-issuer-id: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}

      - name: Stage binary artifacts
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          dest="dist/${target}"
          mkdir -p "$dest"

          for binary in ${{ matrix.binaries }}; do
            cp "target/${target}/release/${binary}" "$dest/${binary}-${target}"
            tar -C "$dest" -czf "$dest/${binary}-${target}.tar.gz" "${binary}-${target}"
            zstd -T0 -19 --rm "$dest/${binary}-${target}"
            if [[ -f "target/${target}/release/${binary}.sigstore" ]]; then
              cp "target/${target}/release/${binary}.sigstore" "$dest/${binary}-${target}.sigstore"
            fi
          done

          if [[ -f "target/${target}/release/aegis-${target}.dmg" ]]; then
            cp "target/${target}/release/aegis-${target}.dmg" "$dest/aegis-${target}.dmg"
          fi
          if [[ -f "target/${target}/release/aegis-${target}.unsigned.txt" ]]; then
            cp "target/${target}/release/aegis-${target}.unsigned.txt" "$dest/aegis-${target}.unsigned.txt"
          fi

      - uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Stage installer package tarball
        env:
          RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          artifacts_dir="${RUNNER_TEMP}/release-artifacts/${target}"
          mkdir -p "$artifacts_dir"
          cp "dist/${target}/aegis-${target}.zst" "$artifacts_dir/"
          if [[ -f "dist/${target}/bwrap-${target}.zst" ]]; then
            cp "dist/${target}/bwrap-${target}.zst" "$artifacts_dir/"
          fi

          vendor_root="${RUNNER_TEMP}/vendor-root"
          native_args=(
            --component aegis
            --component rg
            --target "$target"
            --artifacts-dir "${RUNNER_TEMP}/release-artifacts"
            "$vendor_root"
          )
          if [[ "$target" == *linux* ]]; then
            native_args+=(--component bwrap)
          fi
          python3 ../codex-cli/scripts/install_native_deps.py "${native_args[@]}"

          ../codex-cli/scripts/build_npm_package.py \
            --package "${{ matrix.platform_package }}" \
            --release-version "$RELEASE_VERSION" \
            --vendor-src "$vendor_root/vendor" \
            --staging-dir "${RUNNER_TEMP}/${{ matrix.platform_package }}" \
            --pack-output "dist/${target}/${{ matrix.package_asset }}-${RELEASE_VERSION}.tgz"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target }}
          path: codex-rs/dist/${{ matrix.target }}/*

  release:
    name: Publish GitHub release
    needs:
      - release-context
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          release_dist="${RUNNER_TEMP}/release-dist"
          mkdir -p "$release_dist"
          find dist -type f ! -name 'cargo-timing.html' -exec cp {} "$release_dist/" \;
          cp scripts/install/install.sh "$release_dist/install.sh"
          cp scripts/install/install.ps1 "$release_dist/install.ps1"
          cp codex-rs/core/config.schema.json "$release_dist/config-schema.json"

          {
            echo "# Aegis Code ${{ needs.release-context.outputs.version }}"
            echo
            echo "Release tag: ${{ needs.release-context.outputs.tag }}"
            echo "Source revision: ${GITHUB_SHA}"
            echo
            echo "## Signing"
            echo
            echo "Linux binaries include Sigstore bundle assets (*.sigstore)."
            echo "macOS binaries and DMGs are signed and notarized when Apple signing secrets are configured."
            echo "If an *.unsigned.txt asset is present for a macOS target, that target was intentionally published unsigned because signing credentials were unavailable."
            echo
            echo "## Checksums"
            echo
            echo "Verify downloaded assets with SHA256SUMS."
          } > "$release_dist/RELEASE_NOTES.md"

          (cd "$release_dist" && find . -maxdepth 1 -type f ! -name 'SHA256SUMS' ! -name 'RELEASE_NOTES.md' -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS)
          echo "RELEASE_DIST=$release_dist" >> "$GITHUB_ENV"
          ls -la "$release_dist"

      - name: Upload dry-run release artifacts
        if: ${{ needs.release-context.outputs.create_release != 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: github-release-dry-run-${{ needs.release-context.outputs.version }}
          path: ${{ env.RELEASE_DIST }}/*

      - name: Create GitHub Release
        if: ${{ needs.release-context.outputs.create_release == 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: ${{ needs.release-context.outputs.version }}
          tag_name: ${{ needs.release-context.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ env.RELEASE_DIST }}/RELEASE_NOTES.md
          files: ${{ env.RELEASE_DIST }}/*
          prerelease: ${{ needs.release-context.outputs.prerelease == 'true' }}
